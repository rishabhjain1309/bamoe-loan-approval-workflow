# Application
spring.application.name=loan-approval-workflow
server.port=8080
server.servlet.context-path=/api

# ============================================================
# MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/bamoe_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# Kogito
# ============================================================
# URL of this service (Kogito uses this to register with data-index)
kogito.service.url=http://localhost:8080/api

# URL of the Kogito Data Index (from docker-compose)
# The data-index stores process instance history and enables the Management Console
kogito.data-index.url=http://localhost:8180

# Disable Kogito's built-in auth for development
# In production: configure OIDC/Keycloak here
kogito.security.enabled=false

# ============================================================
# Static resources (your HTML form)
# ============================================================
spring.web.resources.static-locations=classpath:/static/

# ============================================================
# Logging
# ============================================================
# Set to DEBUG to see Kogito process lifecycle events in the console
# e.g. "Process LoanApprovalProcess [id=...] started"
logging.level.org.kie.kogito=INFO
logging.level.com.rebit.bamoe=DEBUG